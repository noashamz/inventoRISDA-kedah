<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InventoRISDA v3.22 | RISDA Kedah</title>
    <style>
        /* Memastikan iframe memenuhi seluruh skrin tanpa margin */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f4f7f6; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/a/macros/risda.gov.my/s/AKfycbyetorELLyy_8C2cGJaRpp-WOCcbCZoGlZ4MUjWVSsmIrMsvjeV_Sv6xFJd7u4KUkze/exec" 
            allow="geolocation; microphone; camera">
    </iframe>

    <script>
        // Logik tambahan untuk membuang memori ralat jika pengguna kembali melalui pautan refresh
        window.onload = function() {
            if (window.location.search.includes('refresh')) {
                // Memberitahu iframe untuk memuat semula secara bersih
                var iframe = document.getElementsByTagName('iframe')[0];
                iframe.src = iframe.src; 
            }
        };
    </script>
</body>
</html>
